apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: credentials-velero
spec:
  data:
  - remoteRef:
      key: VELERO_S3_SECRET_KEY
    secretKey: secretKey
  - remoteRef:
      key: VELERO_S3_ACCESS_KEY
    secretKey: accessKey
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    template:
      data:
        cloud: |
          [default]
          aws_secret_access_key = {{ .secretKey }}
          aws_access_key_id = {{ .accessKey }}
