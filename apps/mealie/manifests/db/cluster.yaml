apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  labels:
    app.kubernetes.io/name: postgres
  name: postgres
spec:
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: backblaze
  bootstrap:
    initdb:
      database: mealie
      owner: mealie
      secret:
        name: postgres-user
  instances: 3
  monitoring:
    enablePodMonitor: true
  resources:
    limits:
      cpu: 400m
      memory: 420Mi
    requests:
      cpu: 130m
      memory: 300Mi
  storage:
    size: 2Gi
    storageClass: lvm-thin
  superuserSecret:
    name: postgres-admin
