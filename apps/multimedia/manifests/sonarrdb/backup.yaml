apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  labels:
    app.kubernetes.io/name: postgres
  name: postgres-sonarr
  namespace: multimedia
spec:
  backupOwnerReference: self
  cluster:
    name: postgres-sonarr
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  schedule: 0 27 3 * * *
  suspend: false
