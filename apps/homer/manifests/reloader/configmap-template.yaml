apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-template
  namespace: homer
data:
  config.yml.tpl: |-
    # This file is read by homer reloader which uses golang templates to generate the final config.yml file.

    title: "Ankhmorpork portal"
    subtitle: "thaum"
    #logo: "assets/logo.png"
    icon: "fas fa-sitemap"

    header: true
    footer: false

    # Optional theme customization
    theme: default
    colors:
      light:
        highlight-primary: "#3367d6"
        highlight-secondary: "#4285f4"
        highlight-hover: "#5a95f5"
        background: "#f5f5f5"
        card-background: "#ffffff"
        text: "#363636"
        text-header: "#ffffff"
        text-title: "#303030"
        text-subtitle: "#424242"
        card-shadow: rgba(0, 0, 0, 0.1)
        link-hover: "#363636"
      dark:
        highlight-primary: "#3367d6"
        highlight-secondary: "#4285f4"
        highlight-hover: "#5a95f5"
        background: "#131313"
        card-background: "#2b2b2b"
        text: "#eaeaea"
        text-header: "#ffffff"
        text-title: "#fafafa"
        text-subtitle: "#f5f5f5"
        card-shadow: rgba(0, 0, 0, 0.4)
        link-hover: "#ffdd57"

    # Optional navbar
    # links: [] # Allows for navbar (dark mode, layout, and search) without any links
    links:
      - name: Status Page
        icon: "fa fa-question"
        url: "https://thaum.statuspage.io/"
      - name: Passwords
        icon: "fa fa-key"
        url: "https://vault.bitwarden.com/"

    tags:
      local: &local
        - tag: local
          tagstyle: "is-success"
      testing: &testing
        - tag: testing
          tagstyle: "is-danger"
      external: &external
        - tag: 3rd party
          tagstyle: "is-info"

    services:
      - name: Ankh Cloud
        icon: "fa fa-cloud"
        items:
    {{- range . }}
    {{- if eq .Group "Ankh Cloud" }}
          - name: {{ .Name }}
            url: "{{ .Url }}"
            {{- if .Subtitle }}
            subtitle: "{{ .Subtitle }}"
            {{- end }}
            {{- if .Logo }}
            logo: "{{ .Logo }}"
            {{- end }}
            {{- if .Tag }}
            <<: *{{ .Tag }}
            {{- end }}
    {{- end }}
    {{- end }}
          - name: Packing list
            subtitle: What to pack on each type of trip
            logo: "https://cdn.jsdelivr.net/npm/@loganmarchione/homelab-svg-assets@latest/assets/googledrive.svg"
            <<: *external
            url: "https://docs.google.com/spreadsheets/d/1d8LFOxTWqAZuA2OSVuZJV7pGUYlJfNCqAIA8Q5p6ci8/edit?usp=sharing"

      - name: Multimedia
        icon: "fa fa-tv"
        items:
          - name: Unifi Drive
            logo: "https://dl.ubnt.com/press/Company_Logos/U_Logo/WEB/U_Logo_RGB.png"
            url: "https://unifi.ui.com"
          - name: Trakt
            subtitle: "Movie and TV series tracking"
            logo: "https://cdn.jsdelivr.net/npm/@loganmarchione/homelab-svg-assets@latest/assets/trakt.svg"
            <<: *external
            url: "https://trakt.tv"
    {{- range . }}
    {{- if eq .Group "Multimedia" }}
          - name: {{ .Name }}
            url: "{{ .Url }}"
            {{- if .Subtitle }}
            subtitle: "{{ .Subtitle }}"
            {{- end }}
            {{- if .Logo }}
            logo: "{{ .Logo }}"
            {{- end }}
            {{- if .Tag }}
            <<: *{{ .Tag }}
            {{- end }}
    {{- end }}
    {{- end }}

      - name: Administration
        icon: "fa fa-user-shield"
        items:
    {{- range . }}
    {{- if eq .Group "Administration" }}
          - name: {{ .Name }}
            url: "{{ .Url }}"
            {{- if .Subtitle }}
            subtitle: "{{ .Subtitle }}"
            {{- end }}
            {{- if .Logo }}
            logo: "{{ .Logo }}"
            {{- end }}
            {{- if .Tag }}
            <<: *{{ .Tag }}
            {{- end }}
    {{- end }}
    {{- end }}
          - name: UptimeRobot
            logo: "https://pbs.twimg.com/profile_images/1404824447052251143/zVZrK9YD_400x400.jpg"
            <<: *external
            url: "https://dashboard.uptimerobot.com"
          - name: Doppler
            logo: "https://dashboard.doppler.com/imgs/logo.png"
            <<: *external
            url: "https://dashboard.doppler.com/"
