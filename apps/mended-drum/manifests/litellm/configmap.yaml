apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app.kubernetes.io/name: litellm
data:
  config.yaml: |
    model_list:
      - model_name: drum-smart
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: drum-fast
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_key: os.environ/ANTHROPIC_API_KEY
    litellm_settings:
      drop_params: true
      num_retries: 3
      request_timeout: 120
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
