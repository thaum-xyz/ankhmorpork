apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mended-drum-tools-db
  labels:
    app.kubernetes.io/name: mended-drum-tools
spec:
  data:
    - remoteRef:
        key: MENDED_DRUM_DB_PASS
      secretKey: password
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    name: mended-drum-tools-db
    template:
      data:
        DATABASE_URL: 'postgres://drum:{{ .password }}@postgres-rw:5432/drum'
