apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    probe-uri: /healthz
  labels:
    probe: enabled
    app.kubernetes.io/name: mended-drum-tools
  name: mended-drum-tools
spec:
  ingressClassName: public
  rules:
    - host: drum-tools.krupa.net.pl
      http:
        paths:
          - backend:
              service:
                name: mended-drum-tools
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - drum-tools.krupa.net.pl
      secretName: mended-drum-tools-tls
